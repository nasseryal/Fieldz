workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        APP_STORE_APP_ID: "6761498061"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Decode GoogleService-Info.plist
        script: echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/GoogleService-Info.plist
      - name: Generate native project
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: |
          # 1. Télécharger le certificat depuis Apple Developer
          app-store-connect fetch-signing-files "com.fieldz.app" \
            --type IOS_APP_STORE \
            --create

          # 2. Installer le certificat dans le keychain
          keychain initialize
          keychain add-certificates

          # 3. Installer NOTRE profile manuellement (celui avec Sign In with Apple)
          #    Le profile est encodé en base64 dans la variable PROVISIONING_PROFILE_FIELDZ
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE_FIELDZ" | base64 --decode > "$PROFILES_DIR/bf6cea08-b84c-4c0a-9c55-651b446e3ecb.mobileprovision"
          echo "Profile installé: $(ls -la "$PROFILES_DIR/bf6cea08-b84c-4c0a-9c55-651b446e3ecb.mobileprovision")"

          # 4. Vérifier que le profile a la capability
          security cms -D -i "$PROFILES_DIR/bf6cea08-b84c-4c0a-9c55-651b446e3ecb.mobileprovision" 2>/dev/null | grep -q "applesignin" \
            && echo "Sign In with Apple OK dans le profile" \
            || echo "ERREUR: Sign In with Apple ABSENT du profile"

          # 5. Forcer l'entitlement dans le projet Xcode
          ENTITLEMENTS_FILE=$(find ios -name "*.entitlements" -not -path "*/Pods/*" | head -1)
          echo "Fichier entitlements: $ENTITLEMENTS_FILE"
          if [ -n "$ENTITLEMENTS_FILE" ] && ! grep -q "com.apple.developer.applesignin" "$ENTITLEMENTS_FILE"; then
            echo "Ajout de Sign In with Apple dans les entitlements..."
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin array" "$ENTITLEMENTS_FILE"
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin:0 string Default" "$ENTITLEMENTS_FILE"
          fi
          cat "$ENTITLEMENTS_FILE"

          # 6. Lister TOUS les profiles installés (diagnostic)
          echo "=== Tous les profiles installés ==="
          ls -la "$PROFILES_DIR/"
      - name: Increment build number
        script: |
          cd ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build iOS
        script: |
          # On utilise xcodebuild directement au lieu de xcode-project build-ipa
          # pour passer EXPLICITEMENT le profile et le certificat.
          # xcode-project build-ipa ne passait que CODE_SIGN_STYLE=Manual
          # sans spécifier le profile → Xcode ne trouvait pas la capability.

          # 1. Archive
          xcodebuild \
            -workspace "ios/Fieldz.xcworkspace" \
            -scheme "Fieldz" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/Fieldz.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="M9C2G4BV44" \
            PROVISIONING_PROFILE_SPECIFIER="Fieldz AppStore Codemagic" \
            PROVISIONING_PROFILE="bf6cea08-b84c-4c0a-9c55-651b446e3ecb"

          # 2. Créer ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string M9C2G4BV44" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string 'Apple Distribution'" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.fieldz.app string 'Fieldz AppStore Codemagic'" /tmp/ExportOptions.plist
          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/Fieldz.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        APP_STORE_APP_ID: "6761498061"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Decode GoogleService-Info.plist
        script: echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/GoogleService-Info.plist
      - name: Generate native project
        script: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.fieldz.app" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/Fieldz.xcworkspace" \
            --scheme "Fieldz"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
